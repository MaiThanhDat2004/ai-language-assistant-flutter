name: flutter_application_1
description: "AI Language Learning Assistant - Flutter frontend"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP & API
  dio: ^5.4.3+1

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.2.0

  # Audio
  record: ^6.1.2
  just_audio: ^0.9.39
  permission_handler: ^11.3.1

  # Image picking (avatar upload)
  image_picker: ^1.1.2

  # JSON / Models
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # UI helpers
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.3
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.68.0

  # Utilities
  path_provider: ^2.1.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/